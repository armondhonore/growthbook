application:
  name: growthbook
  pods:
  - name: app
    image: mirror.gcr.io/growthbook/growthbook:latest
    path: /
    servicePorts:
    - 3000
    vars:
      MONGODB_URI: "mongodb://mongo.pod:27017/growthbook"
      APP_ORIGIN: "https://relaxed-weasel-growthbook.cloud.nexlayer.ai"
      API_HOST: "https://relaxed-weasel-growthbook.cloud.nexlayer.ai"
      JWT_SECRET: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      ENCRYPTION_KEY: "e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
    volumes:
    - name: growthbook-uploads
      mountPath: /usr/local/src/app/packages/back-end/uploads
      size: 5Gi
  - name: mongo
    image: mirror.gcr.io/library/mongo:5
    servicePorts:
    - 27017
    volumes:
    - name: growthbook-mongo
      mountPath: /data/db
      size: 5Gi
